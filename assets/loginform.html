<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

    <style>
        body
        {
            font-family:Arial, Helvetica, sans-serif;
        }
        h1{
            text-align:center;
        }
        form
        {
            border:3px solid black;
        }
        input[type=text],input[type=password]
        {
           width:100%;
            padding:12px 20px;
            margin:8px 0;
            display:inline-block;
            border:1px solid black;
            box-sizing: border-box;
        }
        button
        {
            background-color:aquamarine;
            color:white;
            padding:8px 10px;
            margin:4px 0;
            border:none;
            cursor:pointer;
            width:100%;
        }
        button:hover{
            opacity:0.6;
           background-color:rgb(0, 204, 255);
        }
        .cancelbtn{
            width:auto;
            padding:10px 18px;
            background-color:rgb(248, 42, 42);
        }
         #imagecontain
        {
            text-align:center;
            margin:24px 0 12px 0;
        }
        img.avtar
        {
            width:20%;
            border-radius:50%;
            
        }
        .container
        {
            padding:16px;
        }
        span.psw
        {
            float:right;
            padding-top:16px;
        }
        @media screen and (max-width: 480px)
        {
            span.psw
            {
                display:block;
                float:none;
            }
            .cancelbtn
            {
                width:100%;

            }
        }
       

    </style>
</head>
<body>
  <div class="container-fluid">
    <nav class="navbar sticky-top navbar-expand-lg navbar-dark bg-dark">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ">
                <a href="../index.html" class="nav-item nav-link mx-2 font-weight-bold ">Home</a>
                <a href="campus.html" class="nav-item nav-link mx-2 font-weight-bold">About Us</a>
                <a href="gallery.html" class="nav-item nav-link mx-2 font-weight-bold">Gallery</a>
            </div>
            <div class="navbar-nav ms-auto">
                <a href="loginform.html" class="nav-item nav-link mx-2 font-weight-bold active">Login</a>
            </div>
        </div>
    </nav>
   <h1>Login Form</h1>
    <form>
        <div id="imagecontain">
            <img src="pageimage/img.png" alt="Image Not Found" class="avtar">
        </div>
        <div class="container">
            <label for="name"><b>Username</b></label>
            <input type="text" id="name" required>
            <label for="pass"><b>Password</b></label>
            <input type="password" id="pass" required>
            <button type="Submit">Login</button>
            <label>
                <input type="checkbox" checked="checked" >remember me
            </label>
        </div>
        <div class="container" style="background-color:#f1f1f1">
        <button type="button" class="cancelbtn">Cancel</button>
        <span class="psw">Forgot<a href='#'>password?</a></span>
        </div>
    </form>
 </div>
</body>
</html>
